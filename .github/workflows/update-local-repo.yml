name: update-local-repo

on:
  push:
    branches:
      - master

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Generate LGTM App token
        id: lgtm-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.LGTM_APP_CLIENT_ID }}
          private-key: ${{ secrets.LGTM_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: installer
          permission-contents: write
          permission-pull-requests: write

      - name: Prepare Host
        run: |
          # install helm
          curl -fsSL -O https://github.com/kubepack/helm/releases/download/ac-1.21.0/helm
          chmod +x ./helm
          sudo mv ./helm /usr/local/bin/helm
          # install yq
          curl -fsSL -o yqq https://github.com/mikefarah/yq/releases/download/3.3.0/yq_linux_amd64
          chmod +x yqq
          sudo mv yqq /usr/local/bin/yqq
          pipx install yq

      - name: Install uibuilder-tools
        run: |
          curl -fsSL -o uibuilder-tools https://github.com/kmodules/uibuilder-tools/releases/download/v0.0.1/uibuilder-tools-linux-amd64
          chmod +x uibuilder-tools
          sudo mv ./uibuilder-tools /usr/local/bin/uibuilder-tools

      - name: Prepare git
        env:
          GITHUB_USER: 1gtm
          GITHUB_TOKEN: ${{ steps.lgtm-app-token.outputs.token }}
        run: |
          echo $GITHUB_SERVER_URL
          git config user.name "${GITHUB_USER}"
          git config user.email "${GITHUB_USER}@appscode.com"
          git remote set-url origin "https://${GITHUB_USER}:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git remote -v

      - name: Update Local Helm repo
        env:
          GITHUB_TOKEN: ${{ steps.lgtm-app-token.outputs.token }}
        run: |
          ./hack/scripts/trigger.sh
