# Default values for vcd-lb-gc.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Overrides name template
nameOverride: ""
# Overrides fullname template
fullnameOverride: ""
# Number of vcd-lb-gc replicas to create.
# Two replicas + leader election: one active, one hot standby.
replicaCount: 2
# Docker registry fqdn used to pull docker images.
# Set this to use docker registry hosted at ${registryFQDN}/${registry}/${image}
registryFQDN: ghcr.io
image:
  # Docker registry used to pull the vcd-lb-gc image
  registry: appscode
  # Name of the vcd-lb-gc container image
  repository: vcd-lb-gc
  # vcd-lb-gc container image tag
  tag: ""
  # Compute Resources required by the vcd-lb-gc container
  resources: # +doc-gen:break
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # Security options this container should run with
  securityContext: # +doc-gen:break
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    seccompProfile:
      type: RuntimeDefault

# Specify an array of imagePullSecrets.
# Secrets must be manually created in the namespace.
#
# Example:
# helm template charts/vcd-lb-gc \
#   --set imagePullSecrets[0].name=sec0 \
#   --set imagePullSecrets[1].name=sec1
imagePullSecrets: []
# Container image pull policy
imagePullPolicy: IfNotPresent
# Log level for the controller
logLevel: 2
# Annotations applied to the deployment
annotations: {}
# Annotations passed to the controller pod(s).
podAnnotations: {}
# Node labels for pod assignment
nodeSelector: # +doc-gen:break
  kubernetes.io/os: linux
# Tolerations for pod assignment
tolerations: []
# Affinity rules for pod assignment
affinity: {}
# Security options the controller pod should run with.
podSecurityContext: # +doc-gen:break
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name:

# Controller configuration.
config:
  # CPI cluster ID, e.g. "capvcdCluster:<uuid>" (required)
  clusterID: ""
  # URN of the edge gateway hosting the LB, e.g. "urn:vcloud:gateway:<uuid>" (required)
  edgeGatewayID: ""
  # Reconcile interval
  interval: 60s
  # If true, logs orphans without deleting them.
  # Flip to false to enable deletions once validated.
  dryRun: true
  # Skip DNAT cleanup (set when enableVirtualServiceSharedIP is on)
  skipDNAT: false

# VMware Cloud Director tenant credentials.
# These are written to a Secret and exposed to the controller via envFrom.
vcd:
  # VCD URL, e.g. https://vcd.example.com
  endpoint: ""
  # VCD tenant org name
  org: ""
  # VCD tenant user
  user: ""
  # VCD tenant password
  password: ""
  # Skip TLS verification when talking to VCD
  insecure: false
  # Use an existing Secret holding VCD_ENDPOINT/VCD_ORG/VCD_USER/VCD_PASSWORD
  # keys instead of creating one from the values above.
  existingSecret: ""
