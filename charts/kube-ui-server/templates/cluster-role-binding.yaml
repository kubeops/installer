apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kube-ui-server.fullname" . }}
  labels:
    {{- include "kube-ui-server.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kube-ui-server.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "kube-ui-server.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}

{{- if eq "true" ( include "distro.openshift" . ) }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kube-ui-server.fullname" . }}-cluster-monitoring-viewer
  namespace: openshift-monitoring
  labels:
    {{- include "kube-ui-server.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
- kind: ServiceAccount
  name: {{ include "kube-ui-server.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
