{{ template "cattleset.prepare-certs" $ }}

{{- if .Values.apiserver.enableValidatingWebhook }}

apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validators.cattleset.appscode.com
  {{- $caInject := include "cattleset.webhook-ca-inject-annotations" . }}
  {{- if $caInject }}
  annotations:
    {{- $caInject | nindent 4 }}
  {{- end }}
  labels:
    {{- include "cattleset.labels" . | nindent 4 }}
webhooks:
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        namespace: {{ .Release.Namespace }}
        name: {{ include "cattleset.fullname" . }}
        path: /validate-apps-k8s-appscode-com-v1-cattleset
{{- include "cattleset.webhook-ca-bundle" $ | nindent 6 }}
    failurePolicy: Fail
    name: cattlesets.apps.k8s.appscode.com
    rules:
      - apiGroups:
          - apps.k8s.appscode.com
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - cattlesets
    sideEffects: None

{{- end }}
