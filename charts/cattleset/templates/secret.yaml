{{- if not .Values.apiserver.servingCerts.certManager.enabled }}
{{ template "cattleset.prepare-certs" $ }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cattleset.fullname" . }}-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cattleset.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  ca.crt: {{ $._caCrt }}
  tls.crt: {{ $._serverCrt }}
  tls.key: {{ $._serverKey }}
{{- end }}
