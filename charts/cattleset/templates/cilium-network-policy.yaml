{{- if eq "true" ( include "security.useCiliumNetworkPolicy" . ) }}
# Allow the kube-apiserver to reach the CattleSet webhook server's conversion,
# mutation and validation endpoints.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "cattleset.fullname" . }}-ingress-from-apiserver
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      {{- include "cattleset.selectorLabels" . | nindent 6 }}
  ingress:
  - fromEntities:
    - kube-apiserver
    toPorts:
    - ports:
      - port: "9443"
        protocol: TCP
---
# Allow the cattleset operator pods to reach the Kubernetes API server.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "cattleset.fullname" . }}-egress-kubernetes-api
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      {{- include "cattleset.selectorLabels" . | nindent 6 }}
  egress:
  - toEntities:
    - kube-apiserver
    toPorts:
    - ports:
      - port: "6443"
        protocol: TCP
---
# Allow the cattleset operator pods to resolve DNS.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "cattleset.fullname" . }}-egress-dns
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      {{- include "cattleset.selectorLabels" . | nindent 6 }}
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s:k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
      rules:
        dns:
        - matchPattern: '*'
{{- end }}
