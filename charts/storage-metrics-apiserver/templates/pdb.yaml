{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "storage-metrics-apiserver.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "storage-metrics-apiserver.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "storage-metrics-apiserver.selectorLabels" . | nindent 6 }}
{{- end }}
