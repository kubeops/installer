apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "storage-metrics-apiserver.fullname" . }}
  labels:
    {{- include "storage-metrics-apiserver.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "storage-metrics-apiserver.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "storage-metrics-apiserver.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
---
# Required by every aggregated apiserver: lets it call TokenReview /
# SubjectAccessReview against the core kube-apiserver.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "storage-metrics-apiserver.fullname" . }}-auth-delegator
  labels:
    {{- include "storage-metrics-apiserver.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
- kind: ServiceAccount
  name: {{ include "storage-metrics-apiserver.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
---
# Lets the apiserver read the extension-apiserver-authentication ConfigMap
# in kube-system, used to validate aggregator client certs.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "storage-metrics-apiserver.fullname" . }}-auth-reader
  namespace: kube-system
  labels:
    {{- include "storage-metrics-apiserver.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: extension-apiserver-authentication-reader
subjects:
- kind: ServiceAccount
  name: {{ include "storage-metrics-apiserver.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
