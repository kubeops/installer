apiVersion: v1
kind: Service
metadata:
  name: {{ include "fargocd-manager.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fargocd-manager.labels" . | nindent 4 }}
{{- if eq "prometheus.io/builtin" ( include "monitoring.agent" . ) }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8443"
    prometheus.io/scheme: "https"
{{- end }}
spec:
  ports:
  - name: metrics
    port: 8443
    protocol: TCP
    targetPort: metrics
  selector:
    {{- include "fargocd-manager.selectorLabels" . | nindent 4 }}
